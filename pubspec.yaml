name: heritagebot
description: "HeritageBot: An AI-Based Historical Narrative and Memory Companion."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI icons
  cupertino_icons: ^1.0.8

  # Firebase authentication and Firestore database
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.0.0
  
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.2

  # Geolocation and map
  geolocator: ^11.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Local media storage, picker, video, and API calls
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  video_player: ^2.10.0
  path_provider: ^2.1.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/